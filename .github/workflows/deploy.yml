name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest

    environment: ${{ inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Build backend
        run: |
          cd backend
          npm ci
          npx prisma generate --schema=src/prisma/schema.prisma
          npm run build

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Diagnose server permissions
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" "
            echo '--- whoami ---'
            whoami
            echo '--- /opt/flowtask ownership ---'
            ls -la /opt/ | grep flowtask || echo 'dir missing'
            ls -la /opt/flowtask/ 2>/dev/null | head -10 || echo 'empty or missing'
            ls -la /opt/flowtask/frontend/dist/ 2>/dev/null | head -5 || echo 'no dist'
            echo '--- lsattr ---'
            lsattr -d /opt/flowtask/frontend/dist/assets 2>/dev/null || echo 'lsattr n/a'
            echo '--- sudo available ---'
            sudo -n true 2>&1 && echo 'sudo OK' || echo 'no sudo'
          "

      - name: Deploy to server
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          APP_DIR="/opt/flowtask"
          RSYNC="rsync -az --no-perms --no-group"

          # Wipe and recreate dist dirs to clear any root-owned files from previous deploys
          ssh "$DEPLOY_USER@$DEPLOY_HOST" "
            sudo rm -rf $APP_DIR/frontend/dist && sudo mkdir -p $APP_DIR/frontend/dist && sudo chown \$(whoami):\$(whoami) $APP_DIR/frontend/dist
            sudo rm -rf $APP_DIR/backend/dist  && sudo mkdir -p $APP_DIR/backend/dist  && sudo chown \$(whoami):\$(whoami) $APP_DIR/backend/dist
            mkdir -p $APP_DIR/backend/src/prisma
          "

          # Sync built backend
          $RSYNC backend/dist/ "$DEPLOY_USER@$DEPLOY_HOST:$APP_DIR/backend/dist/"

          # Sync backend node_modules
          $RSYNC --delete backend/node_modules/ "$DEPLOY_USER@$DEPLOY_HOST:$APP_DIR/backend/node_modules/"

          # Sync Prisma schema + migrations (needed for migrate deploy)
          $RSYNC backend/src/prisma/ "$DEPLOY_USER@$DEPLOY_HOST:$APP_DIR/backend/src/prisma/"

          # Sync built frontend
          $RSYNC frontend/dist/ "$DEPLOY_USER@$DEPLOY_HOST:$APP_DIR/frontend/dist/"

          # Sync ecosystem config
          $RSYNC deploy/ecosystem.config.js "$DEPLOY_USER@$DEPLOY_HOST:$APP_DIR/ecosystem.config.js"

      - name: Ensure Redis is running
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" "
            if ! command -v redis-server > /dev/null 2>&1; then
              sudo apt-get update -qq && sudo apt-get install -y redis-server
            fi
            sudo systemctl enable redis-server
            sudo systemctl start redis-server || true
            grep -q 'REDIS_URL' /opt/flowtask/backend/.env \
              || echo 'REDIS_URL=redis://127.0.0.1:6379' >> /opt/flowtask/backend/.env
          "

      - name: Run migrations + restart
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" "
            set -e
            APP_DIR=/opt/flowtask
            export DATABASE_URL='$DATABASE_URL'

            echo '→ Running migrations...'
            cd \$APP_DIR/backend
            NODE_PATH=\$APP_DIR/backend/node_modules \
              node_modules/.bin/prisma migrate deploy --schema=src/prisma/schema.prisma

            echo '→ Restarting PM2...'
            pm2 stop flowtask-api 2>/dev/null || true
            pm2 delete flowtask-api 2>/dev/null || true
            pm2 start \$APP_DIR/ecosystem.config.js --env production
            pm2 save

            echo '→ Health check...'
            for i in \$(seq 1 12); do
              if curl -sf http://localhost:3101/api/health > /dev/null 2>&1; then
                echo '✓ Backend healthy'
                break
              fi
              [ \$i -eq 12 ] && { echo '✗ Health check failed'; pm2 logs flowtask-api --lines 20; exit 1; }
              sleep 5
            done
            echo '=== Deploy complete ==='
          "

      - name: Notify on failure
        if: failure()
        run: echo "Deploy to ${{ inputs.environment }} FAILED at ${{ github.sha }}"
